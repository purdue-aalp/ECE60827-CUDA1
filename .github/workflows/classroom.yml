name: Autograding Tests

on:
  repository_dispatch:
    types: [classroom_submission]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/accel-sim/accel-sim-framework:Ubuntu-24.04-cuda-12.8-minimal

    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # -----------------------------
    # Build step (fails job on error)
    # -----------------------------
    - name: Build
      run: |
        set -e
        mkdir -p build
        cd build
        cmake ..
        make -j$(nproc)

    # -----------------------------
    # Autograding test: executable exists
    # -----------------------------
    - name: Build Success Test
      id: build-success
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Build Succeeds
        command: test
        input: "-x build/lab1"
        expected-output: ""
        comparison-method: exact

    # -----------------------------
    # Report grades (MUST be last)
    # -----------------------------
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        BUILD-SUCCESS_RESULTS: "${{ steps.build-success.outputs.result }}"
      with:
        runners: build-success